<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Training - Request Options</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>

  <main>
    <section class="container-submit" aria-labelledby="training-heading">
      <div class="header-row">
        <h1 id="training-heading">Request Training Options</h1>
        <p>Tell us which training areas you're interested in and your preferred schedule. We'll follow up with details.</p>
      </div>

      <form id="trainingForm" class="submit-form" method="post" action="mailto:contact@example.org" enctype="text/plain">
        <div class="form-row">
          <div class="form-group">
            <label for="fullname">Full name</label>
            <input id="fullname" name="fullname" type="text" required placeholder="Your full name">
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required placeholder="you@example.com">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="phone">Phone (optional)</label>
            <input id="phone" name="phone" type="tel" placeholder="(555) 555-5555">
          </div>

          <div class="form-group category">
            <label for="experience">Experience level</label>
            <select id="experience" name="experience">
              <option value="beginner">Beginner</option>
              <option value="intermediate">Intermediate</option>
              <option value="advanced">Advanced</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group full">
            <label>Training categories (select any)</label>
            <div class="checkbox-grid">
              <label><input type="checkbox" name="category" value="Technology"> Technology</label>
              <label><input type="checkbox" name="category" value="Business"> Business</label>
              <label><input type="checkbox" name="category" value="Professional"> Professional Development</label>
              <label><input type="checkbox" name="category" value="Creative"> Creative Skills</label>
              <label><input type="checkbox" name="category" value="Health"> Health & Wellness</label>
              <label><input type="checkbox" name="category" value="Digital"> Digital Literacy</label>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group full">
            <label for="schedule">Preferred schedule</label>
            <select id="schedule" name="schedule">
              <option value="flexible">Any / Flexible</option>
              <option value="weekdays">Weekdays</option>
              <option value="evenings">Evenings</option>
              <option value="weekends">Weekends</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group full">
            <label for="goals">Comments / Goals</label>
            <textarea id="goals" name="goals" placeholder="What would you like to learn or achieve?" rows="5"></textarea>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label><input type="checkbox" id="consent" name="consent" required> I agree to be contacted about training opportunities.</label>
          </div>
        </div>

        <div class="form-row">
          <button class="submit-btn" type="submit">Send Request</button>
          <a class="resource-btn" href="training.html">Back to Training</a>
        </div>

        <div id="message" role="status" aria-live="polite"></div>
      </form>
    </section>
  </main>

</body>
</html>
